<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Christine — Video Portfolio</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f9f9f7;
  --surface:#ffffff;
  --text:#18180f;
  --muted:#76766e;
  --border:rgba(0,0,0,0.09);
  --tag-bg:#eeede8;
  --accent:#18180f;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#111110;
    --surface:#1b1b18;
    --text:#f0efe9;
    --muted:#88887f;
    --border:rgba(255,255,255,0.09);
    --tag-bg:#252521;
    --accent:#f0efe9;
  }
}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* HEADER */
.header{max-width:780px;margin:0 auto;padding:3rem 2rem 2rem;border-bottom:0.5px solid var(--border);}
.name{font-size:1.5rem;font-weight:600;letter-spacing:-0.03em;margin-bottom:0.35rem;}
.bio{font-size:0.875rem;color:var(--muted);line-height:1.65;max-width:420px;margin-bottom:0.85rem;}
.header-link{font-size:0.8rem;color:var(--muted);border-bottom:0.5px solid var(--border);padding-bottom:1px;}
.header-link:hover{color:var(--text);}

/* MAIN */
main{max-width:780px;margin:0 auto;padding:2.5rem 2rem 5rem;}

/* HERO */
.hero-label{font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:0.85rem;}
.hero-card{border-radius:16px;overflow:hidden;border:0.5px solid var(--border);background:var(--surface);cursor:pointer;margin-bottom:2.5rem;display:flex;flex-direction:column;}
.hero-thumb{position:relative;aspect-ratio:9/16;max-height:480px;background:#1a1a16;overflow:hidden;}
.hero-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.hero-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.22);transition:background 0.15s;}
.hero-card:hover .hero-play{background:rgba(0,0,0,0.35);}
.play-circle{width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,0.93);display:flex;align-items:center;justify-content:center;}
.play-circle svg{margin-left:4px;}
.hero-info{padding:1rem 1.25rem;}
.hero-title{font-size:1rem;font-weight:500;margin-bottom:0.3rem;}
.hero-tag{font-size:0.72rem;padding:2px 9px;border-radius:99px;background:var(--tag-bg);color:var(--muted);}

/* DIVIDER LABEL */
.section-label{font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem;}

/* SMALL GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1rem;}
.card{border-radius:12px;overflow:hidden;border:0.5px solid var(--border);background:var(--surface);cursor:pointer;transition:transform 0.15s;}
.card:hover{transform:translateY(-2px);}
.card-thumb{position:relative;aspect-ratio:9/16;background:#1a1a16;overflow:hidden;}
.card-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.card-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.18);opacity:0;transition:opacity 0.15s;}
.card:hover .card-overlay{opacity:1;}
.small-circle{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.92);display:flex;align-items:center;justify-content:center;}
.small-circle svg{margin-left:3px;}
.card-info{padding:0.7rem 0.85rem;}
.card-title{font-size:0.8rem;font-weight:500;line-height:1.4;margin-bottom:0.25rem;}
.card-tag{font-size:0.67rem;padding:2px 7px;border-radius:99px;background:var(--tag-bg);color:var(--muted);}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;align-items:center;justify-content:center;padding:1.5rem;}
.modal-bg.open{display:flex;}
.modal{background:var(--surface);border-radius:16px;overflow:hidden;width:100%;max-width:380px;position:relative;}
.modal-video{aspect-ratio:9/16;width:100%;background:#000;}
.modal-video iframe{width:100%;height:100%;border:none;display:block;}
.modal-footer{padding:0.8rem 1rem;font-size:0.85rem;font-weight:500;}
.modal-close{position:absolute;top:10px;right:10px;width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,0.55);color:#fff;border:none;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;}
</style>
</head>
<body>

<header class="header">
  <div class="name">Christine</div>
  <p class="bio">Short-form videos spanning different worlds — whatever catches my eye, I make something of it.</p>
  <a class="header-link" href="mailto:bagazinchrstine@gmail.com">bagazinchrstine@gmail.com</a>
</header>

<main>
  <div class="hero-label">Featured</div>
  <div class="hero-card" onclick="openModal('_ABHidCQg_8','Reel')">
    <div class="hero-thumb">
      <img src="https://img.youtube.com/vi/_ABHidCQg_8/maxresdefault.jpg" alt="Featured video" onerror="this.src='https://img.youtube.com/vi/_ABHidCQg_8/mqdefault.jpg'"/>
      <div class="hero-play">
        <div class="play-circle">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="#18180f"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </div>
      </div>
    </div>
    <div class="hero-info">
      <div class="hero-title">Featured Short</div>
      <span class="hero-tag">Featured</span>
    </div>
  </div>

  <div class="section-label">More videos</div>
  <div class="grid" id="grid"></div>
</main>

<div class="modal-bg" id="modalBg" onclick="bgClose(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="modal-video" id="modalVideo"></div>
    <div class="modal-footer" id="modalTitle"></div>
  </div>
</div>

<script>
const VIDEOS=[
  {id:'xXbkjN0nKFc',title:'Short #2',tag:'Video'},
  {id:'6YzD5JIaIaw',title:'Short #3',tag:'Video'},
  {id:'RDgm64mhNsE',title:'Short #4',tag:'Video'},
  {id:'uTGDE0ZrsGQ',title:'Short #5',tag:'Video'},
];

const grid=document.getElementById('grid');
VIDEOS.forEach(v=>{
  grid.innerHTML+=`
    <div class="card" onclick="openModal('${v.id}','${v.title}')">
      <div class="card-thumb">
        <img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg" alt="${v.title}"/>
        <div class="card-overlay">
          <div class="small-circle">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="#18180f"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          </div>
        </div>
      </div>
      <div class="card-info">
        <div class="card-title">${v.title}</div>
        <span class="card-tag">${v.tag}</span>
      </div>
    </div>`;
});

function openModal(ytId,title){
  document.getElementById('modalVideo').innerHTML=`<iframe src="https://www.youtube.com/embed/${ytId}?autoplay=1&rel=0" allow="autoplay;fullscreen" allowfullscreen></iframe>`;
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBg').classList.add('open');
}
function closeModal(){
  document.getElementById('modalBg').classList.remove('open');
  document.getElementById('modalVideo').innerHTML='';
}
function bgClose(e){if(e.target===document.getElementById('modalBg'))closeModal();}
</script>
</body>
</html>
